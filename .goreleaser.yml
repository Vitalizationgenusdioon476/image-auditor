version: 2

project_name: image-auditor

before:
  hooks:
    - cargo install cargo-zigbuild

builds:
  - builder: rust
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: default
    package_name: image-auditor
    vendor: 0franco
    homepage: "https://github.com/0franco/image-auditor"
    maintainer: "0franco"
    description: "Finds & AI-fixes Lighthouse image issues (CLS, lazy loading, WebP, srcset) across your entire codebase in seconds."
    license: MIT
    formats:
      - deb
    bindir: /usr/local/bin
    file_name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: 0franco
    name: image-auditor

brews:
  - name: image-auditor
    repository:
      owner: 0franco
      name: homebrew-ai-image-auditor
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/0franco/image-auditor"
    description: "Finds & AI-fixes Lighthouse image issues (CLS, lazy loading, WebP, srcset) across your entire codebase in seconds."
    license: "MIT"
    install: bin.install "image-auditor"
    test: |
      system "#{bin}/image-auditor", "--version"